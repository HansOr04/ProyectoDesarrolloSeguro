# ============================================================
# OVERRIDE DE PRODUCCIÓN
# Uso VPS:    docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d
# Uso Render: ver render.yaml (solo Monetix)
#
# NOTA sobre puertos: en el docker-compose.yml base TODOS los puertos están
# vinculados a 127.0.0.1 (solo accesibles desde el propio servidor VPS).
# En Docker Compose los overrides de listas (ports) se fusionan, no se reemplazan,
# por lo que no es posible eliminar puertos vía override.
# Traefik enruta el tráfico externo por la red interna Docker, no por puertos del host.
# ============================================================

services:

  # ── TRAEFIK — reverse proxy con TLS automático (Let's Encrypt) ──
  traefik:
    image: traefik:v3.0
    container_name: proyecto-traefik
    command:
      - "--api.dashboard=false"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--providers.docker.network=proyecto-network"
      # HTTP: redirige todo a HTTPS
      - "--entrypoints.web.address=:80"
      - "--entrypoints.web.http.redirections.entrypoint.to=websecure"
      - "--entrypoints.web.http.redirections.entrypoint.scheme=https"
      # HTTPS: TLS termination
      - "--entrypoints.websecure.address=:443"
      # Let's Encrypt (ACME http-01 challenge)
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge=true"
      - "--certificatesresolvers.letsencrypt.acme.httpchallenge.entrypoint=web"
      - "--certificatesresolvers.letsencrypt.acme.email=${ACME_EMAIL:?ERROR: define ACME_EMAIL en .env}"
      - "--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json"
    ports:
      - "80:80"     # Traefik toma el puerto 80 público (redirect a 443)
      - "443:443"   # Traefik toma el puerto 443 público (HTTPS)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - traefik_certs:/letsencrypt
    networks:
      - proyecto-network
    restart: unless-stopped

  # ── KEYCLOAK — modo producción (requiere --proxy=edge detrás de Traefik) ──
  keycloak:
    command: >
      start
      --proxy=edge
      --import-realm
      --db=postgres
      --db-url=jdbc:postgresql://keycloak-db:5432/keycloak
      --db-username=${KEYCLOAK_DB_USER:-keycloak}
      --db-password=${KEYCLOAK_DB_PASSWORD:?ERROR: define KEYCLOAK_DB_PASSWORD en .env}
      --hostname=${KEYCLOAK_HOSTNAME:?ERROR: define KEYCLOAK_HOSTNAME en .env}
    environment:
      KC_PROXY: edge
      KC_HTTP_ENABLED: "true"
      KC_HOSTNAME_STRICT: "false"
      KC_HOSTNAME: ${KEYCLOAK_HOSTNAME:?ERROR: define KEYCLOAK_HOSTNAME en .env}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.keycloak.rule=Host(`${KEYCLOAK_HOSTNAME}`)"
      - "traefik.http.routers.keycloak.entrypoints=websecure"
      - "traefik.http.routers.keycloak.tls.certresolver=letsencrypt"
      - "traefik.http.services.keycloak.loadbalancer.server.port=8080"

  # ── API GATEWAY (Triage) — expuesto vía Traefik ─────────────────
  api-gateway:
    environment:
      CORS_ORIGIN_TRIAGE: ${CORS_ORIGIN_TRIAGE:?ERROR: define CORS_ORIGIN_TRIAGE en .env}
      CORS_ORIGIN_MONETIX: ${CORS_ORIGIN_MONETIX:?ERROR: define CORS_ORIGIN_MONETIX en .env}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.triage-api.rule=Host(`${TRIAGE_API_HOSTNAME:?ERROR: define TRIAGE_API_HOSTNAME en .env}`)"
      - "traefik.http.routers.triage-api.entrypoints=websecure"
      - "traefik.http.routers.triage-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.triage-api.loadbalancer.server.port=80"

  # ── TRIAGE FRONTEND ──────────────────────────────────────────────
  triage-frontend:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.triage-web.rule=Host(`${TRIAGE_FRONTEND_HOSTNAME:?ERROR: define TRIAGE_FRONTEND_HOSTNAME en .env}`)"
      - "traefik.http.routers.triage-web.entrypoints=websecure"
      - "traefik.http.routers.triage-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.triage-web.loadbalancer.server.port=80"

  # ── MONETIX BACKEND ──────────────────────────────────────────────
  monetix-backend:
    environment:
      NODE_ENV: production
      CORS_ORIGIN: ${CORS_ORIGIN_MONETIX:?ERROR: define CORS_ORIGIN_MONETIX en .env}
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monetix-api.rule=Host(`${MONETIX_API_HOSTNAME:?ERROR: define MONETIX_API_HOSTNAME en .env}`)"
      - "traefik.http.routers.monetix-api.entrypoints=websecure"
      - "traefik.http.routers.monetix-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.monetix-api.loadbalancer.server.port=3000"

  # ── MONETIX FRONTEND ─────────────────────────────────────────────
  monetix-frontend:
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.monetix-web.rule=Host(`${MONETIX_FRONTEND_HOSTNAME:?ERROR: define MONETIX_FRONTEND_HOSTNAME en .env}`)"
      - "traefik.http.routers.monetix-web.entrypoints=websecure"
      - "traefik.http.routers.monetix-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.monetix-web.loadbalancer.server.port=80"

  # ── NOTIFICATION SERVICE — SMTP real en producción ───────────────
  notification-service:
    environment:
      SMTP_HOST: ${SMTP_HOST:?ERROR: define SMTP_HOST para producción (p.ej. smtp.gmail.com)}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:?ERROR: define SMTP_USER para producción}
      SMTP_PASS: ${SMTP_PASS:?ERROR: define SMTP_PASS para producción}

  # ── HERRAMIENTAS DEV — deshabilitadas en producción ──────────────
  # Para activarlas: COMPOSE_PROFILES=tools docker-compose ... up -d adminer
  adminer:
    profiles: [tools]
  mongo-express:
    profiles: [tools]
  mailhog:
    profiles: [tools]
  sonarqube:
    profiles: [tools]
  vault-init:
    profiles: [init]

volumes:
  traefik_certs:
