            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Gateway-Token   ${INTERNAL_API_SECRET};
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
        }

        # ── STATIC FILES / UPLOADS ───────────────────────────────────
        location /uploads/ {
            set $upstream_appointment http://appointment-service:5004;
            proxy_pass         $upstream_appointment/uploads/;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Gateway-Token   ${INTERNAL_API_SECRET};
        }

        # ── Páginas de error ─────────────────────────────────────────
        error_page 429 /429.html;
        location = /429.html {
            add_header Content-Type application/json;
            return 429 '{"success":false,"error":{"code":"RATE_LIMIT","message":"Demasiadas solicitudes. Intenta en un momento."}}';
        }

        error_page 500 502 503 504 /50x.html;
        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
