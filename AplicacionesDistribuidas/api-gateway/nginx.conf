events {
    worker_connections 1024;
}

http {
    # No exponer versión de nginx en cabeceras ni páginas de error
    server_tokens off;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for" '
                    'rt=$request_time uct="$upstream_connect_time" '
                    'uht="$upstream_header_time" urt="$upstream_response_time"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # ── Rate-limiting ────────────────────────────────────────────────
    # Endpoints de autenticación: máx. 10 req/minuto por IP
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;
    # Endpoints API generales: máx. 60 req/segundo por IP
    limit_req_zone $binary_remote_addr zone=api_zone:10m  rate=60r/s;

    # ── CORS: solo orígenes conocidos (sin wildcard *) ───────────────
    # Valores inyectados via envsubst desde CORS_ORIGIN_TRIAGE / CORS_ORIGIN_MONETIX
    # Dev:  http://localhost:3000 y http://localhost:5173
    # Prod: https://triage.yourdomain.com y https://monetix.yourdomain.com
    map $http_origin $cors_origin {
        default                    "";
        "${CORS_ORIGIN_TRIAGE}"    "$http_origin";
        "${CORS_ORIGIN_MONETIX}"   "$http_origin";
    }

    # ── DNS dinámico ─────────────────────────────────────────────────
    # Docker reasigna IPs cuando un contenedor se reinicia. Un bloque
    # `upstream { server host:port; }` resuelve el hostname UNA SOLA VEZ
    # al arrancar nginx, así que si auth-service/triage-service/etc. se
    # reinician después del gateway, nginx queda apuntando a una IP
    # muerta (502 Bad Gateway, que además se confunde con un bloqueo de
    # CORS porque el error_page no lleva los headers CORS). Usando el
    # DNS embebido de Docker (127.0.0.11) como `resolver` + una variable
    # en cada `proxy_pass`, nginx vuelve a resolver el hostname en cada
    # request (con cache de `valid`), así que sobrevive a reinicios de
    # los servicios backend sin necesitar reiniciar el gateway.
    resolver 127.0.0.11 valid=10s ipv6=off;

    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        client_max_body_size 50M;

        # ── Health check (sin rate limit ni auth) ────────────────────
        location /health {
            add_header Content-Type application/json;
            return 200 '{"status":"ok","service":"api-gateway"}';
        }

        # ── AUTH SERVICE ─────────────────────────────────────────────
        location /api/auth {
            limit_req zone=auth_zone burst=5 nodelay;
            limit_req_status 429;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Max-Age'       86400 always;
                add_header 'Content-Type'                 'text/plain; charset=utf-8';
                add_header 'Content-Length'               0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            add_header 'X-Frame-Options'              'SAMEORIGIN' always;
            add_header 'X-Content-Type-Options'       'nosniff' always;
            add_header 'X-XSS-Protection'             '1; mode=block' always;
            add_header 'Referrer-Policy'              'strict-origin-when-cross-origin' always;

            set $upstream_auth http://auth-service:5001;
            rewrite ^/api/auth/?(.*)$ /$1 break;
            proxy_pass         $upstream_auth;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade            $http_upgrade;
            proxy_set_header   Connection         'upgrade';
            proxy_set_header   Host               $host;
            proxy_set_header   X-Real-IP          $remote_addr;
            proxy_set_header   X-Forwarded-For    $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto  $scheme;
            proxy_set_header   X-Gateway-Token    ${INTERNAL_API_SECRET};
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
        }

        # ── PATIENT SERVICE ──────────────────────────────────────────
        location /api/patients {
            limit_req zone=api_zone burst=20 nodelay;
            limit_req_status 429;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Max-Age'       86400 always;
                add_header 'Content-Type'                 'text/plain; charset=utf-8';
                add_header 'Content-Length'               0;
                return 204;
            }

            add_header 'Access-Control-Allow-Origin'  $cors_origin always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
            add_header 'X-Frame-Options'              'SAMEORIGIN' always;
            add_header 'X-Content-Type-Options'       'nosniff' always;
            add_header 'X-XSS-Protection'             '1; mode=block' always;
            add_header 'Referrer-Policy'              'strict-origin-when-cross-origin' always;

            set $upstream_patient http://patient-service:5002;
            rewrite ^/api/patients/?(.*)$ /$1 break;
            proxy_pass         $upstream_patient;
            proxy_http_version 1.1;
            proxy_set_header   Upgrade           $http_upgrade;
            proxy_set_header   Connection        'upgrade';
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_set_header   X-Gateway-Token   ${INTERNAL_API_SECRET};
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 90s;
        }

        # ── TRIAGE SERVICE ───────────────────────────────────────────
        location /api/triage {
            limit_req zone=api_zone burst=20 nodelay;
            limit_req_status 429;

            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  $cors_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, PATCH, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Authorization, Content-Type' always;
                add_header 'Access-Control-Max-Age'       86400 always;
