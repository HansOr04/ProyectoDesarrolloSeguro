server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    server_tokens off;

    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header X-XSS-Protection       "1; mode=block"                always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # React Router — todas las rutas desconocidas vuelven a index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Assets estáticos: caché agresivo (el hash de Vite garantiza invalidación)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml image/svg+xml application/font-woff2;
}
